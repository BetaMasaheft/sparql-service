name: Validate Push
on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash
    working-directory: project

jobs:
  validate-all-and-build:
    runs-on: ubuntu-latest
    steps:
      # checkout code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: project

      # checkout schema as xmllint can't https 
      - name: Checkout schema repo
        uses: actions/checkout@v4
        with:
          repository: BetaMasaheft/Schema
          path: schema

      # Speed up apt-get installs
      - name: Disable man-db to make package install and removal faster
        run: |
          echo 'set man-db/auto-update false' | sudo debconf-communicate >/dev/null
          sudo dpkg-reconfigure man-db

      - name: Install Test Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libxml2-utils

      - name: Ensure all XML files are well formed
        run: |
          xmllint --noout \
            $(find . -type f -name '*.xml') 
      
